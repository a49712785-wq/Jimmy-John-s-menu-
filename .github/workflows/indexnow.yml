name: Ping IndexNow (Bing) on Publish

on:
  push:
    branches: [main]

jobs:
  indexnow-ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed pages and ping IndexNow
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -e
          KEY="6809a08440b2eff3761319a680b8c6b4"
          HOST="jimmyjohnsmenus.us"

          # First-ever push has no prior commit to diff against - nothing to compare, so skip.
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "First push on this branch, no previous commit to diff. Skipping ping."
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" || true)
          echo "Files changed in this push:"
          echo "$CHANGED_FILES"

          URLS=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              index.html)
                URLS+=("https://$HOST/")
                ;;
              404.html)
                : # never ping the 404 page
                ;;
              */index.html)
                dir="${file%/index.html}"
                URLS+=("https://$HOST/$dir/")
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ ${#URLS[@]} -eq 0 ]; then
            echo "No page content (index.html files) changed in this push - only assets/config changed. Skipping IndexNow ping."
            exit 0
          fi

          echo "Pinging IndexNow for the following changed page(s):"
          printf '%s\n' "${URLS[@]}"

          URL_JSON=$(printf '%s\n' "${URLS[@]}" | jq -R . | jq -s .)

          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyLocation "https://$HOST/$KEY.txt" \
            --argjson urlList "$URL_JSON" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          echo "Payload:"
          echo "$PAYLOAD"

          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" \
            -w "\nHTTP Status: %{http_code}\n"
